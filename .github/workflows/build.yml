name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Membangun APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Mengambil Kode Repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install Dependencies & Sinkronisasi
        run: |
          npm install
          npx cap sync android
          
      - name: Compile Android (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload Hasil APK
        uses: actions/upload-artifact@v3
        with:
          name: Aplikasi-Video-HD-TikTok
          path: android/app/build/outputs/apk/debug/app-debug.apk
